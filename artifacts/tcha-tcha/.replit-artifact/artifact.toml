kind = "mobile"
previewPath = "/"
title = "Tcha-Tcha"
version = "1.0.0"
id = "artifacts/tcha-tcha"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25722

[services.development]
run = "pnpm --filter @workspace/tcha-tcha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tcha-tcha", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tcha-tcha", "run", "serve" ]

[services.env]
PORT = "25722"
BASE_PATH = "/"
